name: 'ghr install'
description: >-
  Install one or more tools from GitHub releases using `ghr`. Caches the
  installed tools (binaries + extracted artifacts) across workflow runs so a
  cache-hit reduces the install step to a near-instant restore.
author: 'cataggar/ghr contributors'
branding:
  icon: 'download-cloud'
  color: 'gray-dark'

inputs:
  tools:
    description: >-
      Newline-separated list of release specs to install. Each entry is
      `owner/repo[@tag]` (auto-pick asset) or `owner/repo/file[@tag]`
      (specific asset). Lines that are empty or start with `#` are
      ignored.
    required: true
  cache:
    description: >-
      Cache installed tools across runs. Default: true. The cache key is
      `os + arch + sorted(tools) + ghr version`, so adding a tool or
      bumping ghr invalidates the cache cleanly.
    required: false
    default: 'true'
  minisign:
    description: >-
      Optional base64 minisign public key applied as the default for every
      `tools:` line that does not include its own inline key. When set, ghr
      requires a `.minisig` sidecar to be present and verifies it. An inline
      key on a `tools:` line (the second whitespace-separated token, e.g.
      `jedisct1/minisign@0.12 RWQf6LR…`) overrides this default for that
      single spec.
    required: false
    default: ''
  skip-verify:
    description: >-
      Umbrella flag: skip every verification step (checksum, minisign,
      sigstore, authenticode). Default: false.
    required: false
    default: 'false'
  skip-checksum:
    description: >-
      Skip just the checksum-sidecar verification step. Default: false.
    required: false
    default: 'false'
  skip-minisign:
    description: >-
      Skip just the minisign verification step. Bypasses the fail-closed
      behavior that would otherwise reject a published `.minisig` sidecar
      when no key is configured. Default: false.
    required: false
    default: 'false'
  skip-sigstore:
    description: >-
      Skip just the sigstore-bundle verification step. Default: false.
    required: false
    default: 'false'
  skip-authenticode:
    description: >-
      Skip just the Authenticode (Windows PE) verification step.
      Default: false.
    required: false
    default: 'false'
  keep-going:
    description: >-
      Continue past per-spec failures. The job step still exits non-zero
      if any spec failed, but every spec is attempted first.
    required: false
    default: 'false'
  ghr-version:
    description: >-
      Override the `ghr-bin` version installed via pipx. By default the
      action installs the `ghr-bin` version matching its own git ref —
      e.g. when pinned at `@v0.3.0` it installs `ghr-bin==0.3.0`. Pass
      this input to override (e.g. `latest`, or a specific version).
      When set to `latest`, the literal value `latest` is interpreted as
      "no version pin" (pipx installs whatever PyPI considers latest).
    required: false
    default: ''

outputs:
  cache-hit:
    description: >-
      `true` when the tool cache was restored from a prior run, `false`
      otherwise. Mirrors `actions/cache@v4`'s own `cache-hit` output.
    value: ${{ steps.ghr-cache.outputs.cache-hit }}

runs:
  using: composite
  steps:
    - name: Install ghr-bin via pipx
      shell: bash
      env:
        INPUT_VERSION: ${{ inputs.ghr-version }}
        ACTION_REF: ${{ github.action_ref }}
      run: |
        set -euo pipefail
        # Resolution order:
        #   1. explicit `ghr-version:` input (literal "latest" means "no pin")
        #   2. derived from $GITHUB_ACTION_REF if it looks like a semver tag
        #      (e.g. `v0.3.0` -> `0.3.0`)
        #   3. fall back to latest on PyPI
        resolved=""
        if [[ -n "${INPUT_VERSION}" ]]; then
          if [[ "${INPUT_VERSION}" != "latest" ]]; then
            resolved="${INPUT_VERSION}"
          fi
        elif [[ "${ACTION_REF}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-.+)?$ ]]; then
          resolved="${ACTION_REF#v}"
        fi
        if [[ -n "${resolved}" ]]; then
          pipx install "ghr-bin==${resolved}"
        else
          pipx install ghr-bin
        fi

    - name: Point ghr at a cacheable directory
      id: ghr-dirs
      shell: bash
      run: |
        set -euo pipefail
        tool_dir="${RUNNER_TEMP}/ghr-tools"
        bin_dir="${RUNNER_TEMP}/ghr-bin"
        cache_dir="${RUNNER_TEMP}/ghr-cache"
        mkdir -p "$tool_dir" "$bin_dir" "$cache_dir"
        echo "GHR_TOOL_DIR=$tool_dir"   >> "$GITHUB_ENV"
        echo "GHR_BIN_DIR=$bin_dir"     >> "$GITHUB_ENV"
        echo "GHR_CACHE_DIR=$cache_dir" >> "$GITHUB_ENV"
        echo "$bin_dir" >> "$GITHUB_PATH"
        echo "tool_dir=$tool_dir"   >> "$GITHUB_OUTPUT"
        echo "bin_dir=$bin_dir"     >> "$GITHUB_OUTPUT"
        echo "cache_dir=$cache_dir" >> "$GITHUB_OUTPUT"

    - name: Resolve cache key
      id: cache-key
      shell: bash
      env:
        TOOLS_INPUT: ${{ inputs.tools }}
      run: |
        set -euo pipefail
        ghr_version="$(ghr version)"

        # The `tools:` input is one entry per line: `spec` or `spec key`
        # (whitespace-separated). Drop blanks and `#` comments, validate
        # the optional key, and produce a deterministic sorted list of
        # `spec [key]` lines.
        canonical_lines=()
        while IFS= read -r raw_line || [[ -n "$raw_line" ]]; do
          line="${raw_line#"${raw_line%%[![:space:]]*}"}"  # ltrim
          line="${line%"${line##*[![:space:]]}"}"          # rtrim
          [[ -z "$line" ]] && continue
          [[ "${line:0:1}" == "#" ]] && continue
          # Split on whitespace -> tokens
          read -ra tokens <<< "$line"
          n="${#tokens[@]}"
          if (( n < 1 || n > 2 )); then
            printf 'error: tools line must be `spec` or `spec key`, got %d tokens: %s\n' "$n" "$line" >&2
            exit 1
          fi
          spec="${tokens[0]}"
          if (( n == 2 )); then
            key="${tokens[1]}"
            # Structural validation: 56-char base64, starts with RW or RU.
            # `ghr install` re-validates via parsePublicKey and surfaces
            # any decode failure with a clear error.
            if [[ ! "$key" =~ ^(RW|RU)[A-Za-z0-9+/]{53}[A-Za-z0-9+/=]$ ]]; then
              printf 'error: invalid minisign key for spec %s: %s\n' "$spec" "$key" >&2
              exit 1
            fi
            canonical_lines+=("$spec $key")
          else
            canonical_lines+=("$spec")
          fi
        done <<< "${TOOLS_INPUT}"

        if (( ${#canonical_lines[@]} == 0 )); then
          echo "error: 'tools' input is empty" >&2
          exit 1
        fi

        # Sort the (spec [key]) lines so the cache key is stable. Including
        # the key in the hash makes the cache identity reflect the
        # verification material — changing a tool's key forces a re-install
        # and therefore re-verification.
        sorted_specs="$(printf '%s\n' "${canonical_lines[@]}" | LC_ALL=C sort -u)"
        specs_hash="$(printf '%s' "$sorted_specs" | sha256sum | cut -c1-16)"
        key="ghr-${RUNNER_OS}-${RUNNER_ARCH}-ghrv${ghr_version}-${specs_hash}"
        {
          echo "key=$key"
          echo "ghr_version=$ghr_version"
          echo 'sorted_specs<<__GHR_EOF__'
          echo "$sorted_specs"
          echo '__GHR_EOF__'
        } >> "$GITHUB_OUTPUT"

    - name: Restore ghr tool cache
      id: ghr-cache
      if: inputs.cache == 'true'
      uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
      with:
        path: |
          ${{ steps.ghr-dirs.outputs.tool_dir }}
          ${{ steps.ghr-dirs.outputs.bin_dir }}
          ${{ steps.ghr-dirs.outputs.cache_dir }}
        key: ${{ steps.cache-key.outputs.key }}

    - name: Install tools with ghr
      if: steps.ghr-cache.outputs.cache-hit != 'true'
      shell: bash
      env:
        SORTED_SPECS: ${{ steps.cache-key.outputs.sorted_specs }}
        MINISIGN: ${{ inputs.minisign }}
        SKIP_VERIFY: ${{ inputs.skip-verify }}
        SKIP_CHECKSUM: ${{ inputs.skip-checksum }}
        SKIP_MINISIGN: ${{ inputs.skip-minisign }}
        SKIP_SIGSTORE: ${{ inputs.skip-sigstore }}
        SKIP_AUTHENTICODE: ${{ inputs.skip-authenticode }}
        KEEP_GOING: ${{ inputs.keep-going }}
      run: |
        set -euo pipefail
        flags=()
        if [[ "${KEEP_GOING}" == "true" ]]; then flags+=(--keep-going); fi
        if [[ "${SKIP_VERIFY}" == "true" ]]; then flags+=(--skip-verify); fi
        if [[ "${SKIP_CHECKSUM}" == "true" ]]; then flags+=(--skip-checksum); fi
        if [[ "${SKIP_MINISIGN}" == "true" ]]; then flags+=(--skip-minisign); fi
        if [[ "${SKIP_SIGSTORE}" == "true" ]]; then flags+=(--skip-sigstore); fi
        if [[ "${SKIP_AUTHENTICODE}" == "true" ]]; then flags+=(--skip-authenticode); fi
        if [[ -n "${MINISIGN}" ]]; then flags+=(--minisign "${MINISIGN}"); fi
        # SORTED_SPECS is newline-separated `spec` or `spec key` lines.
        # Split each line into individual whitespace-separated tokens so
        # ghr install sees `<spec> [<pubkey>] <spec> ...` as positional
        # arguments.
        positionals=()
        while IFS= read -r line; do
          [[ -z "$line" ]] && continue
          read -ra tokens <<< "$line"
          positionals+=("${tokens[@]}")
        done <<< "${SORTED_SPECS}"
        # Bash 3.2 (macOS `/bin/bash`) treats `"${arr[@]}"` on an empty
        # array as an unbound variable under `set -u`. Use the
        # `${arr[@]+...}` guard so an empty `flags`/`positionals` expands to
        # zero words instead of erroring.
        ghr install ${flags[@]+"${flags[@]}"} ${positionals[@]+"${positionals[@]}"}

    - name: Sanity check (ghr list)
      shell: bash
      run: ghr list
