name: 'ghr download'
description: >-
  Download one or more release assets using `ghr`. Optionally extracts each
  archive into a destination directory and caches the result across runs.
author: 'cataggar/ghr contributors'
branding:
  icon: 'download'
  color: 'gray-dark'

inputs:
  tools:
    description: >-
      Newline-separated list of release specs to download. Each entry is
      `owner/repo[@tag]` (auto-pick asset) or `owner/repo/file[@tag]`
      (specific asset). Lines that are empty or start with `#` are
      ignored.
    required: true
  dest:
    description: >-
      Directory to download (and optionally extract) into. Default: the
      runner's `$RUNNER_TEMP/ghr-download`.
    required: false
    default: ''
  extract:
    description: >-
      Extract archive assets into `dest` after download (uses
      `ghr download --extract`). Default: false.
    required: false
    default: 'false'
  strip-components:
    description: >-
      When `extract` is true, strip N leading path components from
      extracted entries.
    required: false
    default: ''
  cache:
    description: >-
      Cache the `dest` directory across runs. Default: true. The cache
      key is `os + arch + sorted(tools) + extract flag + ghr version`.
    required: false
    default: 'true'
  minisign:
    description: >-
      Optional base64 minisign public key. When set, ghr also requires a
      `.minisig` sidecar to be present for every spec and verifies it.
    required: false
    default: ''
  skip-verify:
    description: >-
      Umbrella flag: skip every verification step (checksum, minisign,
      sigstore, authenticode). Default: false.
    required: false
    default: 'false'
  skip-checksum:
    description: >-
      Skip just the checksum-sidecar verification step. Default: false.
    required: false
    default: 'false'
  skip-minisign:
    description: >-
      Skip just the minisign verification step. Bypasses the fail-closed
      behavior that would otherwise reject a published `.minisig` sidecar
      when no key is configured. Default: false.
    required: false
    default: 'false'
  skip-sigstore:
    description: >-
      Skip just the sigstore-bundle verification step. Default: false.
    required: false
    default: 'false'
  skip-authenticode:
    description: >-
      Skip just the Authenticode (Windows PE) verification step.
      Default: false.
    required: false
    default: 'false'
  keep-going:
    description: >-
      Continue past per-spec failures. The job step still exits non-zero
      if any spec failed, but every spec is attempted first.
    required: false
    default: 'false'
  ghr-version:
    description: >-
      Override the `ghr-bin` version installed via pipx. By default the
      action installs the `ghr-bin` version matching its own git ref —
      e.g. when pinned at `@v0.3.0` it installs `ghr-bin==0.3.0`. Pass
      this input to override (e.g. `latest`, or a specific version).
      When set to `latest`, the literal value `latest` is interpreted as
      "no version pin" (pipx installs whatever PyPI considers latest).
    required: false
    default: ''

outputs:
  cache-hit:
    description: >-
      `true` when the download cache was restored from a prior run.
    value: ${{ steps.ghr-cache.outputs.cache-hit }}
  dest:
    description: >-
      Absolute path of the resolved destination directory.
    value: ${{ steps.ghr-dest.outputs.dest }}

runs:
  using: composite
  steps:
    - name: Install ghr-bin via pipx
      shell: bash
      env:
        INPUT_VERSION: ${{ inputs.ghr-version }}
        ACTION_REF: ${{ github.action_ref }}
      run: |
        set -euo pipefail
        # Resolution order:
        #   1. explicit `ghr-version:` input (literal "latest" means "no pin")
        #   2. derived from $GITHUB_ACTION_REF if it looks like a semver tag
        #      (e.g. `v0.3.0` -> `0.3.0`)
        #   3. fall back to latest on PyPI
        resolved=""
        if [[ -n "${INPUT_VERSION}" ]]; then
          if [[ "${INPUT_VERSION}" != "latest" ]]; then
            resolved="${INPUT_VERSION}"
          fi
        elif [[ "${ACTION_REF}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-.+)?$ ]]; then
          resolved="${ACTION_REF#v}"
        fi
        if [[ -n "${resolved}" ]]; then
          pipx install "ghr-bin==${resolved}"
        else
          pipx install ghr-bin
        fi

    - name: Resolve destination directory
      id: ghr-dest
      shell: bash
      env:
        DEST_INPUT: ${{ inputs.dest }}
      run: |
        set -euo pipefail
        if [[ -z "${DEST_INPUT}" ]]; then
          dest="${RUNNER_TEMP}/ghr-download"
        else
          dest="${DEST_INPUT}"
        fi
        mkdir -p "$dest"
        # Canonicalise to an absolute path for cache stability.
        dest_abs="$(cd "$dest" && pwd)"
        echo "dest=$dest_abs" >> "$GITHUB_OUTPUT"

    - name: Resolve cache key
      id: cache-key
      shell: bash
      env:
        TOOLS_INPUT: ${{ inputs.tools }}
        EXTRACT: ${{ inputs.extract }}
        STRIP: ${{ inputs.strip-components }}
      run: |
        set -euo pipefail
        ghr_version="$(ghr version)"
        sorted_specs="$(printf '%s\n' "${TOOLS_INPUT}" \
          | sed -e 's/[[:space:]]\{1,\}/\n/g' \
          | grep -v '^$' \
          | grep -v '^#' \
          | LC_ALL=C sort -u)"
        if [[ -z "$sorted_specs" ]]; then
          echo "error: 'tools' input is empty" >&2
          exit 1
        fi
        # macOS runner images don't always ship GNU coreutils' `sha256sum`
        # (e.g. the `macos-14` image), so fall back to `shasum -a 256`. Both
        # emit the same SHA-256 hex, so the cache key is identical either way.
        if command -v sha256sum >/dev/null 2>&1; then
          specs_hash="$(printf '%s' "$sorted_specs" | sha256sum | cut -c1-16)"
        else
          specs_hash="$(printf '%s' "$sorted_specs" | shasum -a 256 | cut -c1-16)"
        fi
        extract_tag="x0"
        if [[ "${EXTRACT}" == "true" ]]; then extract_tag="x1"; fi
        strip_tag="s${STRIP:-0}"
        key="ghr-dl-${RUNNER_OS}-${RUNNER_ARCH}-ghrv${ghr_version}-${extract_tag}-${strip_tag}-${specs_hash}"
        {
          echo "key=$key"
          echo "ghr_version=$ghr_version"
          echo 'sorted_specs<<__GHR_EOF__'
          echo "$sorted_specs"
          echo '__GHR_EOF__'
        } >> "$GITHUB_OUTPUT"

    - name: Restore ghr download cache
      id: ghr-cache
      if: inputs.cache == 'true'
      uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
      with:
        path: ${{ steps.ghr-dest.outputs.dest }}
        key: ${{ steps.cache-key.outputs.key }}

    - name: Download assets with ghr
      if: steps.ghr-cache.outputs.cache-hit != 'true'
      shell: bash
      working-directory: ${{ steps.ghr-dest.outputs.dest }}
      env:
        SORTED_SPECS: ${{ steps.cache-key.outputs.sorted_specs }}
        EXTRACT: ${{ inputs.extract }}
        STRIP: ${{ inputs.strip-components }}
        DEST: ${{ steps.ghr-dest.outputs.dest }}
        MINISIGN: ${{ inputs.minisign }}
        SKIP_VERIFY: ${{ inputs.skip-verify }}
        SKIP_CHECKSUM: ${{ inputs.skip-checksum }}
        SKIP_MINISIGN: ${{ inputs.skip-minisign }}
        SKIP_SIGSTORE: ${{ inputs.skip-sigstore }}
        SKIP_AUTHENTICODE: ${{ inputs.skip-authenticode }}
        KEEP_GOING: ${{ inputs.keep-going }}
      run: |
        set -euo pipefail
        flags=()
        if [[ "${EXTRACT}" == "true" ]]; then flags+=(--extract "${DEST}"); fi
        if [[ -n "${STRIP}" ]]; then flags+=(--strip-components "${STRIP}"); fi
        if [[ "${KEEP_GOING}" == "true" ]]; then flags+=(--keep-going); fi
        if [[ "${SKIP_VERIFY}" == "true" ]]; then flags+=(--skip-verify); fi
        if [[ "${SKIP_CHECKSUM}" == "true" ]]; then flags+=(--skip-checksum); fi
        if [[ "${SKIP_MINISIGN}" == "true" ]]; then flags+=(--skip-minisign); fi
        if [[ "${SKIP_SIGSTORE}" == "true" ]]; then flags+=(--skip-sigstore); fi
        if [[ "${SKIP_AUTHENTICODE}" == "true" ]]; then flags+=(--skip-authenticode); fi
        if [[ -n "${MINISIGN}" ]]; then flags+=(--minisign "${MINISIGN}"); fi
        readarray -t specs <<< "${SORTED_SPECS}"
        ghr download "${flags[@]}" "${specs[@]}"

    - name: Sanity check (list dest)
      shell: bash
      run: ls -la "${{ steps.ghr-dest.outputs.dest }}"
