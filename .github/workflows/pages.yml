name: Deploy site to GitHub Pages

# Manual trigger only for now — this lets the site be tested a few times
# from a feature branch (Actions always builds from the ref you select
# when dispatching) before the workflow is merged to main.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    # merjs (the `mer` framework the site is built with) currently fails to
    # compile on native Linux due to an unrelated std.Io.Evented/io_uring
    # stdlib bug in Zig 0.16.0. windows-latest is unaffected, so the site is
    # built there for now; the dist/ output is a plain static site and
    # works the same regardless of which OS produced it.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Install Zig via ghr
        uses: cataggar/ghr/actions/install@v0.6.1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tools: |
            cataggar/zig@v0.16.0 RWSGOq2NVecA2UPNdBUZykf1CCb147pkmdtYxgb3Ti+JO/wCYvhbAb/U

      - name: Build static site with mer
        working-directory: site
        run: zig build prod

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
