name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-linux
            name: linux-x64
          - os: ubuntu-22.04-arm
            target: aarch64-linux
            name: linux-arm64
          - os: macos-14
            target: aarch64-macos
            name: macos-arm64
          - os: windows-latest
            target: x86_64-windows
            name: windows-x64
          # Cross-compiled targets
          - os: ubuntu-22.04
            target: x86_64-macos
            name: macos-x64
          - os: ubuntu-22.04
            target: x86_64-linux-musl
            name: linux-musl-x64
          - os: ubuntu-22.04
            target: aarch64-linux-musl
            name: linux-musl-arm64
          - os: windows-latest
            target: aarch64-windows
            name: windows-arm64

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2
        with:
          version: 0.16.0

      - name: Get version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Compute SOURCE_DATE_EPOCH
        id: sde
        shell: bash
        run: |
          # Derive from the tagged commit so packaging is reproducible.
          SDE=$(git log -1 --pretty=%ct "$GITHUB_SHA")
          echo "value=$SDE" >> "$GITHUB_OUTPUT"
          echo "SOURCE_DATE_EPOCH=$SDE" >> "$GITHUB_ENV"

      - name: Build
        run: zig build -Doptimize=ReleaseSafe -Dtarget=${{ matrix.target }} -Dstrip=true "-Dversion=${{ steps.version.outputs.version }}"

      - name: Azure login (for signing)
        if: endsWith(matrix.target, '-windows')
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Sign Windows binary with Trusted Signing
        if: endsWith(matrix.target, '-windows')
        uses: azure/trusted-signing-action@b443cf8ea4124818d2ea9f043cba29fc3ec47b16 # v1.2.0
        with:
          endpoint: ${{ vars.TRUSTED_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ vars.TRUSTED_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ vars.TRUSTED_SIGNING_PROFILE }}
          files-folder: zig-out/bin
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Package
        shell: bash
        run: |
          PKGNAME="ghr-${{ steps.version.outputs.version }}-${{ matrix.name }}"
          mkdir -p "$PKGNAME/bin"
          case "${{ matrix.target }}" in
            *-windows)   EXT=".exe" ;;
            *)           EXT="" ;;
          esac
          cp "zig-out/bin/ghr${EXT}" "$PKGNAME/bin/"
          cp LICENSE README.md "$PKGNAME/" 2>/dev/null || true
          case "${{ matrix.target }}" in
            *-windows)
              # Windows zips contain a code-signed .exe (Azure Trusted Signing),
              # so the embedded .exe is intentionally not byte-reproducible
              # without the signing key. The zip *wrapper* still should be:
              # scripts/pack-zip.py writes spec-compliant forward-slash paths
              # (git-bash's `zip` emits backslashes, which break strict
              # InfoZIP `unzip` pipelines — see issue from PR #92's CI run),
              # uses SOURCE_DATE_EPOCH for every entry, and emits the sha256
              # sidecar in sha256sum format.
              python3 scripts/pack-zip.py "$PKGNAME" "$PKGNAME.zip"
              ;;
            *)
              # Deterministic tar.gz: fixed mtimes, sorted entries, fixed
              # owner/group, gzip header with mtime=0. See scripts/pack.py.
              # SOURCE_DATE_EPOCH is set in the env from the tagged commit.
              python3 scripts/pack.py "$PKGNAME" "$PKGNAME.tar.gz"
              ;;
          esac

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ matrix.name }}
          path: |
            ghr-*.tar.gz
            ghr-*.tar.gz.sha256
            ghr-*.zip
            ghr-*.zip.sha256

  release:
    name: Create Release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          merge-multiple: true

      - name: Get version
        id: version
        run: |
          RAW="${GITHUB_REF_NAME#v}"
          echo "version=${RAW}" >> "$GITHUB_OUTPUT"
          PEP440=$(echo "$RAW" | sed -E 's/^([0-9]+\.[0-9]+\.[0-9]+)-dev\.([0-9]+)$/\1.dev\2/')
          echo "pep440=${PEP440}" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign archives with cosign (per-asset sigstore bundles)
        env:
          # `cosign sign-blob` in unattended mode auto-accepts the
          # Fulcio identity prompt when COSIGN_YES is set, so this
          # step can run without manual intervention.
          COSIGN_YES: 'true'
        run: |
          set -euo pipefail
          shopt -s nullglob
          for asset in ghr-*.tar.gz ghr-*.zip; do
            cosign sign-blob \
              --bundle "${asset}.sigstore.json" \
              --output-signature /dev/null \
              --output-certificate /dev/null \
              "${asset}"
          done
          ls -la ghr-*.sigstore.json

      - name: Sign archives with minisign (per-asset .minisig sidecars)
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
          MINISIGN_PASSWORD:   ${{ secrets.MINISIGN_PASSWORD }}
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -qq -y minisign expect
          # Write the secret key to a file with 0600. The runner workspace
          # is ephemeral; the trap removes it before the step exits.
          umask 077
          printf '%s\n' "$MINISIGN_SECRET_KEY" > minisign.key
          trap 'rm -f minisign.key' EXIT
          shopt -s nullglob
          for asset in ghr-*.tar.gz ghr-*.zip; do
            # Trusted comment is printed by `ghr install` on successful
            # verification, so encode self-identifying metadata in it.
            comment="timestamp:$(date +%s) file:${asset} commit:${GITHUB_SHA} tag:${GITHUB_REF_NAME}"
            echo "signing ${asset} (trusted comment: ${comment})"
            expect scripts/sign-asset.exp "$asset" "$comment"
          done
          ls -la ghr-*.minisig

      - name: Attest build provenance
        uses: actions/attest-build-provenance@c074443f1aee8d4aeeae555aebba3282517141b2 # v2.2.3
        with:
          subject-path: |
            ghr-*.tar.gz
            ghr-*.zip

      - name: Create release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          name: ghr ${{ steps.version.outputs.version }}
          body: |
            A toolkit for GitHub releases.

            **Install:**
            ```
            pipx install ghr-bin==${{ steps.version.outputs.pep440 }}
            uv tool install ghr-bin==${{ steps.version.outputs.pep440 }}
            winget install ghr --version ${{ steps.version.outputs.version }}
            ghr install cataggar/ghr@${{ github.ref_name }} RWSbsumpaHb+N3KCEt/EUXQ5y6Kkk8r/zCb5Z4jhEuEX8x2/U5wr5QC0
            ```
          files: |
            ghr-*.tar.gz
            ghr-*.tar.gz.sha256
            ghr-*.sigstore.json
            ghr-*.minisig
            ghr-*.zip
            ghr-*.zip.sha256
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, 'dev') }}
