name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-linux
            name: linux-x64
          - os: ubuntu-22.04-arm
            target: aarch64-linux
            name: linux-arm64
          - os: macos-14
            target: aarch64-macos
            name: macos-arm64
          - os: windows-latest
            target: x86_64-windows
            name: windows-x64
          # Cross-compiled targets
          - os: ubuntu-22.04
            target: x86_64-macos
            name: macos-x64
          - os: ubuntu-22.04
            target: x86_64-linux-musl
            name: linux-musl-x64
          - os: ubuntu-22.04
            target: aarch64-linux-musl
            name: linux-musl-arm64
          - os: ubuntu-22.04
            target: aarch64-windows
            name: windows-arm64

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2
        with:
          version: 0.15.2

      - name: Get version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build
        run: zig build -Doptimize=ReleaseSafe -Dtarget=${{ matrix.target }} -Dstrip=true "-Dversion=${{ steps.version.outputs.version }}"

      - name: Package
        shell: bash
        run: |
          PKGNAME="ghr-${{ steps.version.outputs.version }}-${{ matrix.name }}"
          mkdir -p "$PKGNAME/bin"
          case "${{ matrix.target }}" in
            *-windows)   EXT=".exe" ;;
            *)           EXT="" ;;
          esac
          cp "zig-out/bin/ghr${EXT}" "$PKGNAME/bin/"
          cp LICENSE README.md "$PKGNAME/" 2>/dev/null || true
          tar czf "$PKGNAME.tar.gz" "$PKGNAME"
          if command -v sha256sum &>/dev/null; then
            sha256sum "$PKGNAME.tar.gz" > "$PKGNAME.tar.gz.sha256"
          else
            shasum -a 256 "$PKGNAME.tar.gz" > "$PKGNAME.tar.gz.sha256"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ matrix.name }}
          path: |
            ghr-*.tar.gz
            ghr-*.sha256

  release:
    name: Create Release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          merge-multiple: true

      - name: Get version
        id: version
        run: |
          RAW="${GITHUB_REF_NAME#v}"
          echo "version=${RAW}" >> "$GITHUB_OUTPUT"
          PEP440=$(echo "$RAW" | sed -E 's/^([0-9]+\.[0-9]+\.[0-9]+)-dev\.([0-9]+)$/\1.dev\2/')
          echo "pep440=${PEP440}" >> "$GITHUB_OUTPUT"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@c074443f1aee8d4aeeae555aebba3282517141b2 # v2.2.3
        with:
          subject-path: |
            ghr-*.tar.gz

      - name: Create release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          name: ghr ${{ steps.version.outputs.version }}
          body: |
            ## ghr ${{ steps.version.outputs.version }}

            Install tools from GitHub releases.

            **Install:**
            ```
            uv tool install ghr-bin==${{ steps.version.outputs.pep440 }}
            ```
          files: |
            ghr-*.tar.gz
            ghr-*.sha256
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, 'dev') }}
